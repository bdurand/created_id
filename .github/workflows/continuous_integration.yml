name: Continuous Integration
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches-ignore:
      - actions-*
  workflow_dispatch:

jobs:
  specs:
    name: ruby-${{ matrix.ruby }} ${{ matrix.appraisal }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "ruby"
            standardrb: true
            yard: true
          - ruby: "3.3"
            appraisal: "activerecord_8"
          - ruby: "3.0"
            appraisal: "activerecord_7"
          - ruby: "2.7"
            appraisal: "activerecord_6"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Ruby CI
        uses: bdurand/github-actions/ruby-ci@v1.0.3
        with:
          ruby: ${{ matrix.ruby }}
          appraisal: ${{ matrix.appraisal }}
          bundler: ${{ matrix.bundler }}
          standardrb: ${{ matrix.standardrb }}
          yard: ${{ matrix.yard }}
          frozen_strings: ${{ matrix.frozen_strings }}
